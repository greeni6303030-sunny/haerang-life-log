
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해랑多感 Life Log</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f3ee;margin:0}
header{background:#4d6b50;color:#fff;padding:18px;text-align:center}
main{max-width:900px;margin:20px auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
label{display:block;margin-top:12px;font-weight:bold}
input,textarea{width:100%;padding:8px;margin-top:4px;box-sizing:border-box}
button{margin-top:16px;padding:10px 18px;background:#4d6b50;color:#fff;border:none;border-radius:8px;cursor:pointer}
.stats{margin-top:24px;padding:12px;background:#eef5ee;border-radius:8px}
</style>
</head>
<body>
<header>
<h1>해랑多感 Life Log</h1>
<p>Every day becomes a story.</p>
</header>
<main>
<label>날짜</label>
<input id="date" type="date">

<label>오늘 가장 중요한 일 (Top 3)</label>
<textarea id="top3" rows="3"></textarea>

<label>블로그 주제</label>
<input id="blog">

<label>글쓰기 시간(분)</label>
<input id="write" type="number">

<label>독서 시간(분)</label>
<input id="read" type="number">

<label>공부 시간(분)</label>
<input id="study" type="number">

<label>운동 시간(분)</label>
<input id="exercise" type="number">

<label>오늘 한 줄</label>
<textarea id="memo" rows="4"></textarea>

<button onclick="save()">저장</button>

<div class="stats">
<h3>현재 기록</h3>
<div id="status">아직 저장되지 않았습니다.</div>
</div>
</main>

<script>
document.getElementById("date").value=new Date().toISOString().slice(0,10);

function save(){
 const data={
  date:date.value,
  top3:top3.value,
  blog:blog.value,
  write:write.value,
  read:read.value,
  study:study.value,
  exercise:exercise.value,
  memo:memo.value
 };
 localStorage.setItem("haerang-life-log",JSON.stringify(data));
 status.innerHTML="<b>저장 완료!</b><br>"+data.date+
 "<br>글쓰기 "+(data.write||0)+"분"+
 "<br>독서 "+(data.read||0)+"분"+
 "<br>공부 "+(data.study||0)+"분"+
 "<br>운동 "+(data.exercise||0)+"분";
}

const s=localStorage.getItem("haerang-life-log");
if(s){
 const d=JSON.parse(s);
 for(const k in d){
   if(document.getElementById(k)) document.getElementById(k).value=d[k];
 }
 status.innerHTML="이전 기록을 불러왔습니다.";
}
</script>
</body>
</html>
